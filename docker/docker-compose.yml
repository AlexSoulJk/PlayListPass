version: '3.8'

services:
  # --- База Данных ---
  db:
    image: postgres:16.2-alpine
    container_name: playlist_db
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}          
      DB_PORT: ${DB_PORT}          
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - playlist_network

  # --- Local S3 (MinIO) ---
  minio:
    image: minio/minio:latest
    container_name: playlist_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - playlist_network

  # --- MinIO init (bucket + CORS + public read) ---
  minio_init:
    image: minio/mc:latest
    container_name: playlist_minio_init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
          echo 'Waiting for MinIO...'
          sleep 2
        done
        mc mb -p local/$$S3_BUCKET_NAME || true
        i=0
        until mc anonymous set download local/$$S3_BUCKET_NAME; do
          i=$$((i + 1))
          if [ $$i -ge 10 ]; then
            echo 'Failed to set anonymous policy'
            break
          fi
          sleep 2
        done
        echo 'MinIO bucket initialized'
        exit 0
    restart: "no"
    networks:
      - playlist_network

  # --- Backend ---
  backend:
    build:
      context: ..    
      dockerfile: docker/backend/Dockerfile
    container_name: playlist_backend
    ports:              
      - "${BACKEND_EXTERNAL_PORT}:${BACKEND_INTERNAL_PORT}"
    volumes:
      - ../backend:/app         
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio_init:
        condition: service_completed_successfully
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}          
      DB_PORT: ${DB_PORT}          
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION_NAME: ${S3_REGION_NAME}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      S3_PRESIGNED_PUBLIC_BASE_URL: ${S3_PRESIGNED_PUBLIC_BASE_URL}
      S3_PRESIGNED_URL_TTL_SECONDS: ${S3_PRESIGNED_URL_TTL_SECONDS}
    networks:
      - playlist_network

  # --- Frontend ---
  frontend:
    build:
      context: ..                     
      dockerfile: docker/frontend/Dockerfile 
    container_name: playlist_frontend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true 
    networks:
      - playlist_network

  # --- Nginx (Gateway) ---
  nginx:
    build:
      context: ..                     
      dockerfile: docker/nginx/Dockerfile
    container_name: playlist_nginx
    ports:
      - "${NGINX_EXTERNAL_PORT}:80"                
    depends_on:
      - backend
      - frontend
    networks:
      - playlist_network

    # --- Adminer (Database Management) ---
  adminer:
    image: adminer:latest
    container_name: playlist_adminer
    restart: always
    ports:
      - "8081:8080" # Внешний порт 8080
    environment:
      # По умолчанию Adminer может подхватить сервер, если передать его через ADMINER_DEFAULT_SERVER
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - playlist_network

volumes:
  postgres_data:
  minio_data:

networks:
  playlist_network:
    driver: bridge
